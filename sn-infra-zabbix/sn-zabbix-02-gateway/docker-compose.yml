version: "3.8"

services:
  sn-zabbix-java-gateway:
    image: zabbix/zabbix-java-gateway:alpine-6.4-latest
    container_name: sn-zabbix-java-gateway
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 10052"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - scm-network

networks:
  scm-network:
    external: true
