version: "3.8"

services:
  sn-openldap:
    image: osixia/openldap:1.5.0
    container_name: sn-openldap
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ./data/certificates:/container/service/slapd/assets/certs
      - ./data/slapd/database:/var/lib/ldap
      - ./data/slapd/config:/etc/ldap/slapd.d
    environment:
      LDAP_LOG_LEVEL: "256"
      LDAP_ORGANISATION:
      LDAP_DOMAIN: "ldap.mysite.com"
      LDAP_ADMIN_USERNAME: "admin"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_CONFIG_PASSWORD: "config"
      LDAP_BASE_DN: "dc=ldap,dc=mysite,dc=com"
      LDAP_TLS_CRT_FILENAME: "tls_crt_ldap.crt"
      LDAP_TLS_KEY_FILENAME: "tls_key_ldap.key"
      LDAP_TLS_CA_CRT_FILENAME: "tls_ca_ldap.crt"
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: "readonly"
      LDAP_READONLY_USER_PASSWORD: "readonly"
    networks:
      - scm-network

  sn-phpldapadmin:
    build:
      context: .
      dockerfile: phpldapadmin/Dockerfile
    image: sn-phpldapadmin:custom
    hostname: ldap.mysite.com
    ports:
      - "8888:80"
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "sn-openldap"
      PHPLDAPADMIN_HTTPS: "false"
    depends_on:
      - sn-openldap
    networks:
      - scm-network

networks:
  scm-network:
    external: true
