version: "3.8"

services:
  sn-front-jenkins:
    image: jenkins/jenkins:2.521
    hostname: sn-front-jenkins.mysite.com
    #extra_hosts:
    #  - "gitlab.mysite.com:192.168.0.x"
    ports:
      - 10040:8080
      - 50000:50000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cpus: 2
    mem_limit: 3g
    user: "1000:1000"
    volumes:
      - ./jenkins_home:/var/jenkins_home
    environment:
      - JENKINS_OPTS=--httpPort=8080
      - JAVA_OPTS=-Duser.timezone=Asia/Seoul -Xms512m -Xmx1024m
      - NODE_OPTIONS=--max-old-space-size=1536
    networks:
      - scm-network

networks:
  scm-network:
    external: true
